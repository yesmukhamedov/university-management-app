<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-3">Courses</h1>
    <form method="get" th:object="${searchForm}" class="row g-2 mb-3">
        <div class="col-md-3"><input class="form-control" type="text" th:field="*{courseName}" placeholder="Course name"></div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{creditsFrom}" placeholder="Credits from"></div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{creditsTo}" placeholder="Credits to"></div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{maxStudentsFrom}" placeholder="Max from"></div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{maxStudentsTo}" placeholder="Max to"></div>
        <div class="col-md-3">
            <select class="form-select" th:field="*{teacherId}">
                <option value="">All</option>
                <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.teacherName}"></option>
            </select>
        </div>
        <div class="col-md-2"><select class="form-select" th:field="*{sortBy}"><option value="id">ID</option><option value="courseName">Course</option><option value="credits">Credits</option><option value="maxStudents">Max students</option></select></div>
        <div class="col-md-2"><select class="form-select" th:field="*{sortDirection}"><option value="ASC">ASC</option><option value="DESC">DESC</option></select></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Search</button></div>
    </form>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Course</th><th>Credits</th><th>Max Students</th><th>Teacher</th></tr></thead>
        <tbody>
        <tr th:each="c : ${page.content}">
            <td th:text="${c.id}"></td><td th:text="${c.courseName}"></td><td th:text="${c.credits}"></td><td th:text="${c.maxStudents}"></td><td th:text="${c.teacher != null ? c.teacher.teacherName : '-'}"></td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex gap-3 align-items-center">
        <a class="btn btn-outline-secondary" th:if="${page.hasPrevious()}"
           th:href="@{/courses(page=${page.number-1},size=${page.size},courseName=${searchForm.courseName},creditsFrom=${searchForm.creditsFrom},creditsTo=${searchForm.creditsTo},maxStudentsFrom=${searchForm.maxStudentsFrom},maxStudentsTo=${searchForm.maxStudentsTo},teacherId=${searchForm.teacherId},sortBy=${searchForm.sortBy},sortDirection=${searchForm.sortDirection})}">Previous</a>
        <span th:text="${(page.number + 1) + ' / ' + page.totalPages}"></span>
        <a class="btn btn-outline-secondary" th:if="${page.hasNext()}"
           th:href="@{/courses(page=${page.number+1},size=${page.size},courseName=${searchForm.courseName},creditsFrom=${searchForm.creditsFrom},creditsTo=${searchForm.creditsTo},maxStudentsFrom=${searchForm.maxStudentsFrom},maxStudentsTo=${searchForm.maxStudentsTo},teacherId=${searchForm.teacherId},sortBy=${searchForm.sortBy},sortDirection=${searchForm.sortDirection})}">Next</a>
    </div>
</div>
</body>
</html>
