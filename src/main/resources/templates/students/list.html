<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-3">Students</h1>
    <form method="get" th:object="${searchForm}" class="row g-2 mb-3">
        <div class="col-md-3"><input class="form-control" type="text" th:field="*{name}" placeholder="Name"></div>
        <div class="col-md-3"><input class="form-control" type="text" th:field="*{groupName}" placeholder="Group"></div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{ageFrom}" placeholder="Age from"></div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{ageTo}" placeholder="Age to"></div>
        <div class="col-md-2"><input class="form-control" type="number" step="0.01" th:field="*{gpaFrom}" placeholder="GPA from"></div>
        <div class="col-md-2"><input class="form-control" type="number" step="0.01" th:field="*{gpaTo}" placeholder="GPA to"></div>
        <div class="col-md-2">
            <select class="form-select" th:field="*{sortBy}">
                <option value="id">ID</option><option value="studentName">Name</option><option value="age">Age</option><option value="groupName">Group</option><option value="gpa">GPA</option>
            </select>
        </div>
        <div class="col-md-2"><select class="form-select" th:field="*{sortDirection}"><option value="ASC">ASC</option><option value="DESC">DESC</option></select></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Search</button></div>
    </form>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Name</th><th>Age</th><th>Group</th><th>GPA</th></tr></thead>
        <tbody>
        <tr th:each="s : ${page.content}">
            <td th:text="${s.id}"></td><td th:text="${s.studentName}"></td><td th:text="${s.age}"></td><td th:text="${s.groupName}"></td><td th:text="${s.gpa}"></td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex gap-3 align-items-center">
        <a class="btn btn-outline-secondary" th:if="${page.hasPrevious()}"
           th:href="@{/students(page=${page.number-1},size=${page.size},name=${searchForm.name},groupName=${searchForm.groupName},ageFrom=${searchForm.ageFrom},ageTo=${searchForm.ageTo},gpaFrom=${searchForm.gpaFrom},gpaTo=${searchForm.gpaTo},sortBy=${searchForm.sortBy},sortDirection=${searchForm.sortDirection})}">Previous</a>
        <span th:text="${(page.number + 1) + ' / ' + page.totalPages}"></span>
        <a class="btn btn-outline-secondary" th:if="${page.hasNext()}"
           th:href="@{/students(page=${page.number+1},size=${page.size},name=${searchForm.name},groupName=${searchForm.groupName},ageFrom=${searchForm.ageFrom},ageTo=${searchForm.ageTo},gpaFrom=${searchForm.gpaFrom},gpaTo=${searchForm.gpaTo},sortBy=${searchForm.sortBy},sortDirection=${searchForm.sortDirection})}">Next</a>
    </div>
</div>
</body>
</html>
