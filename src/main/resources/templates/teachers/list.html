<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teachers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-3">Teachers</h1>
    <form method="get" th:object="${searchForm}" class="row g-2 mb-3">
        <div class="col-md-3"><input class="form-control" type="text" th:field="*{name}" placeholder="Name"></div>
        <div class="col-md-3">
            <select class="form-select" th:field="*{department}">
                <option value="">All</option>
                <option th:each="d : ${T(kz.iitu.hello.domain.enums.Department).values()}" th:value="${d}" th:text="${d}"></option>
            </select>
        </div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{experienceYearsFrom}" placeholder="Exp from"></div>
        <div class="col-md-2"><input class="form-control" type="number" th:field="*{experienceYearsTo}" placeholder="Exp to"></div>
        <div class="col-md-2"><select class="form-select" th:field="*{sortBy}"><option value="id">ID</option><option value="teacherName">Name</option><option value="experienceYears">Experience</option><option value="department">Department</option></select></div>
        <div class="col-md-2"><select class="form-select" th:field="*{sortDirection}"><option value="ASC">ASC</option><option value="DESC">DESC</option></select></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Search</button></div>
    </form>

    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Name</th><th>Department</th><th>Experience</th></tr></thead>
        <tbody>
        <tr th:each="t : ${page.content}">
            <td th:text="${t.id}"></td><td th:text="${t.teacherName}"></td><td th:text="${t.department}"></td><td th:text="${t.experienceYears}"></td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex gap-3 align-items-center">
        <a class="btn btn-outline-secondary" th:if="${page.hasPrevious()}"
           th:href="@{/teachers(page=${page.number-1},size=${page.size},name=${searchForm.name},department=${searchForm.department},experienceYearsFrom=${searchForm.experienceYearsFrom},experienceYearsTo=${searchForm.experienceYearsTo},sortBy=${searchForm.sortBy},sortDirection=${searchForm.sortDirection})}">Previous</a>
        <span th:text="${(page.number + 1) + ' / ' + page.totalPages}"></span>
        <a class="btn btn-outline-secondary" th:if="${page.hasNext()}"
           th:href="@{/teachers(page=${page.number+1},size=${page.size},name=${searchForm.name},department=${searchForm.department},experienceYearsFrom=${searchForm.experienceYearsFrom},experienceYearsTo=${searchForm.experienceYearsTo},sortBy=${searchForm.sortBy},sortDirection=${searchForm.sortDirection})}">Next</a>
    </div>
</div>
</body>
</html>
